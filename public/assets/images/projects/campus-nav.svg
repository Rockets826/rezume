<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="200" fill="url(#glow)"/>
  <!-- Grid -->
  <g opacity="0.15" stroke="#3B82F6" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Buildings -->
  <g fill="url(#accent)" opacity="0.9">
    <path d="M180 320 L180 180 L240 140 L300 180 L300 320 Z" opacity="0.6"/>
    <path d="M320 320 L320 160 L380 120 L440 160 L440 320 Z"/>
    <path d="M460 320 L460 200 L520 170 L580 200 L580 320 Z" opacity="0.7"/>
  </g>
  <!-- Route line -->
  <path d="M220 320 Q350 260 400 220 T560 320" stroke="url(#accent)" stroke-width="2" fill="none" stroke-dasharray="6 4" opacity="0.8"/>
  <!-- Points -->
  <circle cx="220" cy="320" r="6" fill="#3B82F6"/>
  <circle cx="400" cy="220" r="6" fill="#6366F1"/>
  <circle cx="560" cy="320" r="6" fill="#3B82F6"/>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#71717A">Campus Navigation System</text>
</svg>
